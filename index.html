<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Aboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.22), transparent 35%),
        linear-gradient(180deg, #050505, #111);
      color: #f7e7b4;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 92vh;
      border: 2px solid #d4af37;
      border-radius: 30px;
      padding: 28px 22px;
      background: rgba(0,0,0,0.92);
      box-shadow: 0 0 35px rgba(212,175,55,0.28);
      text-align: center;
    }

    .welcome-area {
      min-height: 78vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .welcome-title {
      font-size: 42px;
      letter-spacing: 3px;
      color: #f5d36a;
      margin-bottom: 28px;
    }

    .welcome-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid #d4af37;
      background: radial-gradient(circle, #3b2a1a, #050505);
      color: #f5d36a;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(212,175,55,0.3);
    }

    .main {
      display: none;
    }

    .greeting {
      font-size: 42px;
      color: #f5d36a;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .sub {
      color: #eee;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .qr-box {
      border: 1px solid rgba(212,175,55,0.7);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 22px;
      background: rgba(255,255,255,0.04);
    }

    .jam-title {
      font-size: 28px;
      color: #f5d36a;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .qr {
      width: 230px;
      max-width: 100%;
      background: white;
      border: 4px solid #d4af37;
      border-radius: 16px;
      padding: 8px;
      margin: 14px auto;
      display: block;
    }

    .text {
      color: #eee;
      font-size: 15px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #d4af37;
      color: white;
      text-decoration: none;
      font-size: 17px;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
    }

    .btn:hover {
      background: rgba(212,175,55,0.16);
    }

    .reset {
      margin-top: 20px;
      background: transparent;
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 14px;
      padding: 10px 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="screen">

    <div class="welcome-area" id="welcomeArea">
      <div class="welcome-title">WELCOME<br>ABOARD</div>
      <button class="welcome-btn" onclick="startWelcome()">WELCOME</button>
    </div>

    <div class="main" id="mainScreen">
      <h1 class="greeting" id="greeting">GOOD EVENING</h1>
      <p class="sub">Enjoy your premium ride experience.</p>

      <div class="qr-box">
        <h2 class="jam-title">ENJOY OUR JAM</h2>
        <p class="text">Put the music you want directly from your phone.</p>

        <img src="qr-jam.jpg" alt="QR Code" class="qr">

        <p class="text">Scan the QR and play the music you want.</p>
      </div>

      <a class="btn" href="https://open.spotify.com" target="_blank">Access Spotify</a>
      <a class="btn" href="https://youtube.com" target="_blank">Access YouTube Premium</a>
      <a class="btn" href="https://primevideo.com" target="_blank">Access Amazon Video</a>

      <button class="reset" onclick="resetPage()">New Passenger</button>
    </div>
  </div>

  <script>
    const audio = new Audio("welcome.mp3");

    function setGreeting() {
      const hour = new Date().getHours();
      const greeting = document.getElementById("greeting");

      if (hour >= 5 && hour < 12) {
        greeting.textContent = "GOOD MORNING";
      } else if (hour >= 12 && hour < 18) {
        greeting.textContent = "GOOD AFTERNOON";
      } else {
        greeting.textContent = "GOOD EVENING";
      }
    }

    function startWelcome() {
      setGreeting();

      document.getElementById("welcomeArea").style.display = "none";
      document.getElementById("mainScreen").style.display = "block";

      audio.currentTime = 0;
      audio.play().catch(() => {
        console.log("Audio blocked or welcome.mp3 not found.");
      });
    }

    function resetPage() {
      audio.pause();
      audio.currentTime = 0;
      document.getElementById("mainScreen").style.display = "none";
      document.getElementById("welcomeArea").style.display = "flex";
    }
  </script>
</body>
</html>
