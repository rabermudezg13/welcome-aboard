<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Café Cultura — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: rgba(201,168,76,0.18);
      --cream: #F5EDD9;
      --dark: #0D0B08;
      --dark2: #161410;
      --dark3: #1E1B16;
      --coffee: #3B2A1A;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(60,42,26,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 85%, rgba(201,168,76,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── GRAIN OVERLAY ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    /* ── MAIN LAYOUT ── */
    .app {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 24px 48px;
    }

    /* ── HEADER ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeDown 1s ease 0.3s forwards;
    }

    .brand-logo {
      width: 64px; height: 64px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
      box-shadow: 0 0 24px rgba(201,168,76,0.15);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .brand-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,237,217,0.4);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0;
      animation: fadeIn 1s ease 0.8s forwards;
    }

    /* ── WELCOME SECTION ── */
    .welcome-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 360px;
    }

    /* ── IDLE STATE ── */
    .idle-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .idle-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,237,217,0.35);
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    /* ── BIG BUTTON ── */
    .welcome-btn {
      position: relative;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: none;
      background: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .btn-ring-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.25);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    .btn-ring-mid {
      position: absolute; inset: 12px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.45);
      animation: pulse-ring 3s ease-in-out 0.4s infinite;
    }

    .btn-core {
      position: absolute; inset: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #3B2A1A, #0D0B08 70%);
      border: 1.5px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow:
        0 0 40px rgba(201,168,76,0.12),
        inset 0 1px 0 rgba(201,168,76,0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .welcome-btn:active .btn-core {
      transform: scale(0.96);
      box-shadow: 0 0 60px rgba(201,168,76,0.3), inset 0 1px 0 rgba(201,168,76,0.2);
    }

    .btn-icon { font-size: 30px; }

    .btn-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .btn-text-small {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(245,237,217,0.4);
    }

    .welcome-btn {
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
    }

    /* ── ACTIVE / GREETING STATE ── */
    .greeting-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 8px;
    }

    .greeting-state.visible {
      display: flex;
    }

    .greeting-icon {
      font-size: 52px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .greeting-headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1.2;
      color: var(--cream);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .greeting-headline em {
      color: var(--gold-light);
      font-style: italic;
    }

    .greeting-messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .msg-pill {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: rgba(245,237,217,0.85);
      opacity: 0;
      transform: translateY(12px);
    }

    .msg-pill.show {
      animation: fadeUp 0.5s ease forwards;
    }

    .msg-pill .icon { margin-right: 8px; font-size: 15px; }

    /* ── SEATBELT ALERT ── */
    .seatbelt-alert {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 1.5px solid var(--gold);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      opacity: 0;
      animation: seatbeltPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.8s forwards;
    }

    .seatbelt-icon { font-size: 26px; flex-shrink: 0; }

    .seatbelt-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--gold-light);
      line-height: 1.4;
    }

    .seatbelt-text small {
      display: block;
      font-weight: 300;
      font-size: 11px;
      color: rgba(245,237,217,0.5);
      letter-spacing: 0.3px;
    }

    /* ── RESET BUTTON ── */
    .reset-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid rgba(245,237,217,0.15);
      border-radius: 30px;
      color: rgba(245,237,217,0.35);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.4s ease 2.8s forwards;
      transition: color 0.2s, border-color 0.2s;
    }

    .reset-btn:hover, .reset-btn:active {
      color: var(--cream);
      border-color: rgba(245,237,217,0.4);
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(245,237,217,0.2);
    }

    .footer-dots {
      display: flex; gap: 6px;
    }

    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.3;
    }

    /* ── SPEECH INDICATOR ── */
    .speaking-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      margin-top: -8px;
    }

    .speaking-indicator.active { display: flex; }

    .speak-bar {
      width: 3px;
      background: var(--gold);
      border-radius: 2px;
      animation: soundbar 0.8s ease-in-out infinite alternate;
    }

    .speak-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .speak-bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .speak-bar:nth-child(3) { height: 20px; animation-delay: 0.05s; }
    .speak-bar:nth-child(4) { height: 14px; animation-delay: 0.2s; }
    .speak-bar:nth-child(5) { height: 8px;  animation-delay: 0.1s; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes popIn {
      0%   { transform: scale(0.3); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes seatbeltPop {
      0%   { opacity: 0; transform: scale(0.95) translateY(8px); }
      60%  { transform: scale(1.02) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1);    opacity: 0.5; }
      50%       { transform: scale(1.04); opacity: 1; }
    }

    @keyframes soundbar {
      from { transform: scaleY(0.4); opacity: 0.6; }
      to   { transform: scaleY(1);   opacity: 1; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- BRAND HEADER -->
  <div class="brand">
    <div class="brand-logo">☕</div>
    <div class="brand-name">Café Cultura</div>
    <div class="brand-sub">Premium Ride Experience</div>
  </div>

  <div class="divider"></div>

  <!-- CENTER CONTENT -->
  <div class="welcome-area">

    <!-- IDLE STATE -->
    <div class="idle-state" id="idleState">
      <div class="idle-label">Tap to welcome your passenger</div>

      <button class="welcome-btn" id="welcomeBtn" onclick="triggerWelcome()">
        <div class="btn-ring-outer"></div>
        <div class="btn-ring-mid"></div>
        <div class="btn-core">
          <span class="btn-icon">🚗</span>
          <span class="btn-text">Welcome</span>
          <span class="btn-text-small">New Passenger</span>
        </div>
      </button>
    </div>

    <!-- GREETING STATE -->
    <div class="greeting-state" id="greetingState">

      <div class="greeting-icon">🎉</div>

      <div class="greeting-headline">
        Welcome aboard<br>your <em>Chevy Tahoe</em>
      </div>

      <div class="speaking-indicator" id="speakIndicator">
        <div class="speak-bar"></div>
        <div class="speak-bar"></div>
        <div class="speak-bar"></div>
        <div class="speak-bar"></div>
        <div class="speak-bar"></div>
      </div>

      <div class="greeting-messages" id="greetingMessages">
        <div class="msg-pill" id="msg1">
          <span class="icon">😊</span> Make yourself comfortable
        </div>
        <div class="msg-pill" id="msg2">
          <span class="icon">🌡️</span> Temperature adjusted for your comfort
        </div>
      </div>

      <div class="seatbelt-alert" id="seatbeltAlert">
        <div class="seatbelt-icon">🔔</div>
        <div class="seatbelt-text">
          Please fasten your seatbelt
          <small>Required before we hit the road</small>
        </div>
      </div>

      <button class="reset-btn" id="resetBtn" onclick="resetApp()">
        ✦ New Passenger
      </button>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-dots">
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
    </div>
    <div class="footer-text">Café Cultura LLC · Miami, FL</div>
  </div>

</div>

<script>
  // ── AUDIO SETUP ──
  // Place welcome.mp3 in the same folder as this HTML file
  const audio = new Audio('welcome.mp3');
  audio.preload = 'auto';

  const indicator = document.getElementById('speakIndicator');

  audio.addEventListener('play',  () => indicator.classList.add('active'));
  audio.addEventListener('ended', () => indicator.classList.remove('active'));
  audio.addEventListener('pause', () => indicator.classList.remove('active'));
  audio.addEventListener('error', () => {
    indicator.classList.remove('active');
    console.warn('welcome.mp3 not found — place it in the same folder as this HTML file.');
  });

  function playWelcome() {
    audio.currentTime = 0;
    audio.play().catch(err => console.warn('Audio play blocked:', err));
  }

  function triggerWelcome() {
    const idle     = document.getElementById('idleState');
    const greeting = document.getElementById('greetingState');

    // Fade out idle
    idle.style.opacity   = '0';
    idle.style.transform = 'translateY(-20px)';

    setTimeout(() => {
      idle.style.display = 'none';
      greeting.classList.add('visible');

      // Stagger message pills
      ['msg1', 'msg2'].forEach((id, i) => {
        setTimeout(() => {
          const el = document.getElementById(id);
          el.classList.add('show');
          el.style.animationDelay = '0s';
        }, 400 + i * 300);
      });

      // Play MP3 after short delay
      setTimeout(playWelcome, 300);

    }, 350);
  }

  function resetApp() {
    audio.pause();
    audio.currentTime = 0;
    indicator.classList.remove('active');

    const idle     = document.getElementById('idleState');
    const greeting = document.getElementById('greetingState');

    greeting.classList.remove('visible');

    // Reset pills
    ['msg1', 'msg2'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('show');
      el.style.opacity = '0';
      el.style.transform = 'translateY(12px)';
    });

    // Reset seatbelt animation
    const sb = document.getElementById('seatbeltAlert');
    sb.style.animation = 'none';
    sb.style.opacity = '0';
    setTimeout(() => { sb.style.animation = ''; }, 50);

    idle.style.display   = 'flex';
    idle.style.opacity   = '0';
    idle.style.transform = 'translateY(20px)';
    setTimeout(() => {
      idle.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      idle.style.opacity    = '1';
      idle.style.transform  = 'translateY(0)';
    }, 50);
  }

  // ── AUTO-TRIGGER via URL param ──
  // Open:  cafe-cultura-welcome.html?welcome=1  → dispara automáticamente
  // Reset: cafe-cultura-welcome.html            → pantalla idle normal
  (function checkURLTrigger() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('welcome') === '1') {
      // Wait for page animations to settle, then fire
      setTimeout(triggerWelcome, 1200);
    }
  })();
</script>

</body>
</html>
